name: CI — Unit Tests

on:
  pull_request:
  push:
    branches: ["**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: streaming/go.sum

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.17"

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check CLI
        run: pnpm --dir packages/cli typecheck

      - name: Check web formatting
        run: pnpm --filter web format:check

      - name: Lint web
        run: pnpm --filter web lint

      - name: Install Elixir dependencies
        run: cd gateway && mix deps.get

      - name: Check Elixir formatting
        run: cd gateway && mix format --check-formatted

      - name: Check Go formatting
        run: |
          cd streaming
          test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)

      - name: Go vet
        run: cd streaming && go vet ./...

  test-web:
    name: Web (Vitest)
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter web prisma generate

      - name: Run Vitest
        run: pnpm --filter web test

      - name: Run coverage
        run: pnpm --filter web test:coverage

      - name: Type check
        run: pnpm --filter web typecheck

  test-cli:
    name: CLI (Vitest + Build)
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run CLI tests
        run: pnpm --dir packages/cli test

      - name: Build CLI package
        run: pnpm --dir packages/cli build

  test-streaming:
    name: Streaming Proxy (Go)
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: streaming/go.sum

      - name: Run Go tests
        run: cd streaming && go test ./... -v -count=1 -race

  test-gateway:
    name: Gateway (ExUnit)
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.17"

      - uses: actions/cache@v4
        with:
          path: |
            gateway/deps
            gateway/_build
          key: mix-${{ runner.os }}-${{ hashFiles('gateway/mix.lock') }}
          restore-keys: |
            mix-${{ runner.os }}-

      - name: Install dependencies
        run: cd gateway && mix deps.get

      - name: Compile
        run: cd gateway && MIX_ENV=test mix compile --warnings-as-errors

      - name: Run ExUnit tests
        env:
          JWT_SECRET: ci-test-jwt-secret
          INTERNAL_API_SECRET: ci-test-internal-secret
        run: cd gateway && mix test --trace
