name: Integration — Regression Harness

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regression:
    name: Regression Harness (Docker Compose)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install bcryptjs for regression harness
        run: npm install --no-save bcryptjs
        working-directory: packages/web

      - name: Generate .env for CI
        run: |
          cp .env.example .env
          chmod +x scripts/ci-env-setup.sh
          ./scripts/ci-env-setup.sh

      - name: Build and start all services
        run: docker compose up --build -d

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services..."
          for i in $(seq 1 90); do
            if curl -sf http://localhost:3000/api/health > /dev/null 2>&1 && \
               curl -sf http://localhost:4001/api/health > /dev/null 2>&1 && \
               curl -sf http://localhost:4002/health > /dev/null 2>&1; then
              echo "All services healthy after ${i}s"
              break
            fi
            if [ "$i" -eq 90 ]; then
              echo "Services failed to start within 90s"
              docker compose ps
              docker compose logs --tail=50
              exit 1
            fi
            sleep 1
          done

      - name: Seed database
        run: |
          # The prisma.seed config lives in packages/web/package.json, not the root.
          # Run from /app/packages/web so Prisma finds the seed command.
          docker compose exec -T -w /app/packages/web web npx prisma db seed

      - name: Verify seed data and auth
        run: |
          echo "=== Checking seeded users in database ==="
          docker compose exec -T db psql -U tavok -d tavok -c \
            "SELECT email, username, length(password) as pw_hash_len FROM \"User\" WHERE email IN ('demo@tavok.ai','alice@tavok.ai','bob@tavok.ai')"

          echo ""
          echo "=== Testing curl-based NextAuth login ==="
          COOKIE_JAR=$(mktemp)

          # Get CSRF token + cookie
          CSRF_RESPONSE=$(curl -s -c "$COOKIE_JAR" http://localhost:3000/api/auth/csrf)
          CSRF_TOKEN=$(echo "$CSRF_RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['csrfToken'])" 2>/dev/null || echo "PARSE_FAILED")
          echo "CSRF token (first 20 chars): ${CSRF_TOKEN:0:20}..."

          # Authenticate with seeded user
          AUTH_RESPONSE=$(curl -s -b "$COOKIE_JAR" -c "$COOKIE_JAR" \
            -X POST http://localhost:3000/api/auth/callback/credentials \
            -d "email=demo@tavok.ai&password=DemoPass123!&csrfToken=$CSRF_TOKEN&json=true")
          echo "Auth response: $AUTH_RESPONSE"

          # Check if session cookie was set
          echo ""
          echo "=== Cookies after auth ==="
          cat "$COOKIE_JAR"
          rm -f "$COOKIE_JAR"

      - name: Run regression harness
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/regression-harness.ps1

      - name: Install Playwright browsers
        run: cd packages/web && npx playwright install chromium --with-deps

      - name: Run Playwright E2E tests
        run: cd packages/web && npx playwright test --reporter=list

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: packages/web/test-results/
          retention-days: 7

      - name: Collect service logs on failure
        if: failure()
        run: |
          mkdir -p /tmp/ci-logs
          docker compose logs web > /tmp/ci-logs/web.log 2>&1
          docker compose logs gateway > /tmp/ci-logs/gateway.log 2>&1
          docker compose logs streaming > /tmp/ci-logs/streaming.log 2>&1
          docker compose logs db > /tmp/ci-logs/db.log 2>&1
          docker compose logs redis > /tmp/ci-logs/redis.log 2>&1
          docker compose ps > /tmp/ci-logs/ps.txt 2>&1

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: service-logs
          path: /tmp/ci-logs/
          retention-days: 7

      - name: Teardown
        if: always()
        run: docker compose down -v
